<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>docs - direction artistique enixCode</title>
<meta name="theme-color" content="#f8f9fa" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0d0e12" media="(prefers-color-scheme: dark)" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Archivo+Narrow:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="tokens.css" />

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Archivo', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--hot); text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: var(--hot); color: var(--mark-fg); }

.topbar {
  border-bottom: 2px solid var(--rule);
  padding: 12px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Archivo Narrow', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 12px;
  position: sticky;
  top: 0;
  background: var(--paper);
  z-index: 50;
}
.topbar .left { display: flex; gap: 14px; align-items: center; }
.topbar .dot { width: 8px; height: 8px; background: var(--hot); display: inline-block; }
.topbar .right { color: var(--muted); }
.topbar .right a { color: var(--muted); }

.layout {
  max-width: 1180px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 48px;
  padding: 32px;
}

aside {
  position: sticky;
  top: 60px;
  align-self: start;
  border-right: 1px solid var(--rule-soft);
  padding-right: 24px;
}
aside h3 {
  font-family: 'Archivo Narrow', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--muted);
  margin-bottom: 14px;
}
aside ul { list-style: none; }
aside li { margin-bottom: 6px; }
aside a {
  display: block;
  padding: 6px 10px;
  color: var(--ink);
  font-size: 14px;
  border-left: 2px solid transparent;
  font-family: 'JetBrains Mono', monospace;
}
aside a:hover { background: var(--paper-2); text-decoration: none; }
aside a.active {
  border-left-color: var(--hot);
  background: var(--paper-2);
  color: var(--hot);
}

main { min-width: 0; }

.md h1, .md h2, .md h3, .md h4 {
  font-family: 'Archivo Narrow', sans-serif;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 32px 0 14px;
}
.md h1 {
  font-size: clamp(32px, 4vw, 48px);
  text-transform: uppercase;
  letter-spacing: -0.02em;
  margin-top: 0;
  border-bottom: 2px solid var(--rule);
  padding-bottom: 14px;
}
.md h2 {
  font-size: 22px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--rule-soft);
  padding-bottom: 8px;
}
.md h3 { font-size: 17px; }
.md p { margin: 12px 0; }
.md ul, .md ol { margin: 12px 0 12px 24px; }
.md li { margin-bottom: 4px; }
.md code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--paper-2);
  padding: 1px 6px;
  font-size: 0.9em;
  border: 1px solid var(--rule-soft);
}
.md pre {
  background: var(--paper-2);
  border: 1px solid var(--rule-soft);
  padding: 16px;
  overflow-x: auto;
  margin: 16px 0;
  font-size: 13px;
}
.md pre code { background: none; border: none; padding: 0; }
.md blockquote {
  border-left: 3px solid var(--hot);
  padding: 4px 16px;
  margin: 16px 0;
  color: var(--ink-soft);
  font-family: 'Fraunces', serif;
  font-style: italic;
}
.md table {
  border-collapse: collapse;
  width: 100%;
  margin: 16px 0;
  font-size: 14px;
}
.md th, .md td {
  border: 1px solid var(--rule-soft);
  padding: 8px 12px;
  text-align: left;
}
.md th {
  background: var(--paper-2);
  font-family: 'Archivo Narrow', sans-serif;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 0.08em;
}
.md hr { border: none; border-top: 1px solid var(--rule-soft); margin: 32px 0; }
.md img { max-width: 100%; }

.loading, .error {
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  padding: 40px 0;
}
.error { color: var(--hot); }

@media (max-width: 800px) {
  .layout { grid-template-columns: 1fr; gap: 24px; padding: 20px; }
  aside { position: static; border-right: none; border-bottom: 1px solid var(--rule-soft); padding-right: 0; padding-bottom: 16px; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="left">
    <span class="dot"></span>
    <span>enixCode</span>
    <span>/ da</span>
    <span>// docs</span>
  </div>
  <div class="right"><a href="index.html">brand book</a> &nbsp;·&nbsp; <a href="https://github.com/enixCode/da">github</a></div>
</header>

<div class="layout">
  <aside>
    <h3>// fichiers</h3>
    <ul id="nav"></ul>
  </aside>
  <main>
    <article class="md" id="content"><div class="loading">loading...</div></article>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
<script>
const FILES = [
  { name: 'README', file: 'README.md' },
  { name: 'PALETTE', file: 'PALETTE.md' },
  { name: 'TYPOGRAPHY', file: 'TYPOGRAPHY.md' },
  { name: 'VOICE', file: 'VOICE.md' },
  { name: 'LAYOUT', file: 'LAYOUT.md' },
  { name: 'COMPONENTS', file: 'COMPONENTS.md' },
  { name: 'ACCESSIBILITY', file: 'ACCESSIBILITY.md' },
  { name: 'MOTION', file: 'MOTION.md' },
  { name: 'CONSUMERS', file: 'CONSUMERS.md' },
  { name: 'CHANGELOG', file: 'CHANGELOG.md' },
];

const nav = document.getElementById('nav');
const content = document.getElementById('content');

FILES.forEach(f => {
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.href = '#' + f.file;
  a.textContent = f.name;
  a.dataset.file = f.file;
  li.appendChild(a);
  nav.appendChild(li);
});

async function load(file) {
  content.innerHTML = '<div class="loading">loading ' + file + '...</div>';
  document.querySelectorAll('aside a').forEach(a => a.classList.toggle('active', a.dataset.file === file));
  try {
    const r = await fetch(file, { cache: 'no-cache' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    content.innerHTML = marked.parse(text);
    window.scrollTo(0, 0);
  } catch (e) {
    content.innerHTML = '<div class="error">failed to load ' + file + ': ' + e.message + '</div>';
  }
}

function fromHash() {
  const h = location.hash.slice(1);
  const match = FILES.find(f => f.file === h);
  load(match ? match.file : 'README.md');
}

window.addEventListener('hashchange', fromHash);
fromHash();
</script>

</body>
</html>
